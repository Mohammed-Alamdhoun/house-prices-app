<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>House Price Predictor</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
    }
    .card {
      transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
    }
    .card:hover {
      box-shadow: 0 .5rem 2rem rgba(0,0,0,.15)!important;
    }
    .form-floating > .form-control:focus ~ label,
    .form-floating > .form-control:not(:placeholder-shown) ~ label,
    .form-floating > .form-select ~ label {
      color: #0d6efd;
      font-weight: 600;
    }
    .btn-primary {
      background: linear-gradient(to right, #0d6efd, #0b5ed7);
      border: none;
      transition: all 0.3s;
    }
    .btn-primary:hover {
      background: linear-gradient(to right, #0b5ed7, #0a53be);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8 col-md-10">
      <div class="card shadow border-0 rounded-4 overflow-hidden">
        
        <!-- Header Section -->
        <div class="bg-white px-4 px-md-5 pt-5 pb-3 text-center border-bottom">
          <div class="display-6 mb-2 text-primary">
            <i class="bi bi-house-door-fill"></i>
          </div>
          <h1 class="h3 mb-1 fw-bold text-dark">House Price Predictor</h1>
          <p class="text-muted mb-0">Enter the property details below to estimate its market value.</p>
        </div>

        <!-- Form Section -->
        <div class="card-body p-4 p-md-5 bg-white">
          <form id="form" action="/predict" method="post" class="row g-4">

            <!-- Quality & Year -->
            <div class="col-md-6">
              <div class="form-floating">
                <input class="form-control bg-light" id="OverallQual" name="OverallQual" type="number" min="1" max="10" placeholder="10" required />
                <label for="OverallQual"><i class="bi bi-star-fill text-warning me-2"></i>Overall Quality (1-10)</label>
              </div>
            </div>

            <div class="col-md-6">
              <div class="form-floating">
                <input class="form-control bg-light" id="YearBuilt" name="YearBuilt" type="number" min="1800" max="2026" placeholder="2000" required />
                <label for="YearBuilt"><i class="bi bi-calendar-event text-secondary me-2"></i>Year Built</label>
              </div>
            </div>

            <!-- Areas -->
            <div class="col-md-6">
              <div class="form-floating">
                <input class="form-control bg-light" id="GrLivArea" name="GrLivArea" type="number" min="0" placeholder="1500" required />
                <label for="GrLivArea"><i class="bi bi-arrows-fullscreen text-secondary me-2"></i>Above-Ground Area (sq ft)</label>
              </div>
            </div>

            <div class="col-md-6">
              <div class="form-floating">
                <input class="form-control bg-light" id="FirstFlrSF" name="FirstFlrSF" type="number" min="0" placeholder="1000" required />
                <label for="FirstFlrSF"><i class="bi bi-layers text-secondary me-2"></i>First Floor Area (sq ft)</label>
              </div>
            </div>

            <div class="col-md-6">
              <div class="form-floating">
                <input class="form-control bg-light" id="TotalBsmtSF" name="TotalBsmtSF" type="number" min="0" placeholder="800" required />
                <label for="TotalBsmtSF"><i class="bi bi-bricks text-secondary me-2"></i>Basement Area (sq ft)</label>
              </div>
            </div>

            <div class="col-md-6">
              <div class="form-floating">
                <input class="form-control bg-light" id="FullBath" name="FullBath" type="number" min="0" max="5" placeholder="2" required />
                <label for="FullBath"><i class="bi bi-droplet-fill text-info me-2"></i>Full Bathrooms (1-5)</label>
              </div>
            </div>

            <!-- Finishes & Specific Quality -->
            <div class="col-md-6">
              <div class="form-floating">
                <select class="form-select bg-light" id="ExterQual" name="ExterQual" required>
                  <option value="" disabled selected>Select...</option>
                  <option value="Ex">Excellent</option>
                  <option value="Gd">Good</option>
                  <option value="TA">Average</option>
                  <option value="Fa">Fair</option>
                  <option value="Po">Poor</option>
                </select>
                <label for="ExterQual"><i class="bi bi-paint-bucket text-secondary me-2"></i>Exterior Quality</label>
              </div>
            </div>

            <div class="col-md-6">
              <div class="form-floating">
                <select class="form-select bg-light" id="KitchenQual" name="KitchenQual" required>
                  <option value="" disabled selected>Select...</option>
                  <option value="Ex">Excellent</option>
                  <option value="Gd">Good</option>
                  <option value="TA">Average</option>
                  <option value="Fa">Fair</option>
                  <option value="Po">Poor</option>
                </select>
                <label for="KitchenQual"><i class="bi bi-cup-hot-fill text-secondary me-2"></i>Kitchen Quality</label>
              </div>
            </div>

            <!-- Garage -->
            <div class="col-md-6">
              <div class="form-floating">
                <input class="form-control bg-light" id="GarageCars" name="GarageCars" type="number" min="0" max="5" placeholder="2" required />
                <label for="GarageCars"><i class="bi bi-car-front-fill text-secondary me-2"></i>Garage Capacity (1-5)</label>
              </div>
            </div>

            <div class="col-md-6">
              <div class="form-floating">
                <select class="form-select bg-light" id="GarageFinish" name="GarageFinish" required>
                  <option value="" disabled selected>Select...</option>
                  <option value="Fin">Finished</option>
                  <option value="RFn">Rough Finished</option>
                  <option value="Unf">Unfinished</option>
                  <option value="NA">No Garage</option>
                </select>
                <label for="GarageFinish"><i class="bi bi-tools text-secondary me-2"></i>Garage Finish</label>
              </div>
            </div>

            <!-- Submit Button -->
            <div class="col-12 mt-4 pt-2">
              <button type="submit" id="btn" class="btn btn-primary btn-lg w-100 py-3 shadow-sm rounded-3 fw-bold">
                <span id="spinner" class="spinner-border spinner-border-sm me-2 d-none" aria-hidden="true"></span>
                <i class="bi bi-calculator me-2"></i> Calculate Estimate
              </button>
            </div>

            <!-- Results Alert -->
            <div class="col-12">
              <div id="result" class="alert d-none text-center fs-5 fw-semibold mb-0 mt-3 shadow-sm rounded-3" role="alert"></div>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
    const API_URL = "http://127.0.0.1:8000/predict";

    const numeric = [
        "OverallQual",
        "GrLivArea",
        "GarageCars",
        "TotalBsmtSF",
        "YearBuilt",
        "FirstFlrSF",
        "FullBath"
    ];

    const form = document.getElementById("form");
    const btn = document.getElementById("btn");
    const spinner = document.getElementById("spinner");
    const result = document.getElementById("result");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const data = Object.fromEntries(new FormData(form));

        numeric.forEach((key) => {
            data[key] = Number(data[key]);
        });

        btn.disabled = true;
        spinner.classList.remove("d-none");
        result.className = "alert d-none";

        try {
            const res = await fetch(API_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            });

            if (!res.ok) {
                throw new Error(`Server returned ${res.status}`);
            }
            const price = await res.json();

            result.className = "alert alert-success text-center fs-5 fw-semibold mb-0 mt-2";

            result.textContent = `Predicted price: $${Math.round(price).toLocaleString("en-US")}`;

        } catch (err) {
            result.className = "alert alert-danger text-center mb-0 mt-2";
            result.textContent = `Error: ${err.message} — Is the API running on localhost:8000?`;

        } finally {
            btn.disabled = false;
            spinner.classList.add("d-none");
        }
    });
</script>
</body>
</html>
